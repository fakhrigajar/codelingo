<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/codelingo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeLingo — Learn Tech, Level Up</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('codelingo:theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (stored === '"dark"' || (stored === null && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-bg dark:bg-indigo-dark text-ink dark:text-white font-body antialiased transition-colors">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
